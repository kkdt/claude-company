<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark terminal background -->
  <rect width="32" height="32" rx="6" fill="#0d1117"/>

  <!-- Vertical trunk line -->
  <rect x="6" y="5" width="1.5" height="22" fill="#4a90c4"/>

  <!-- Branch 1 (top): horizontal line + elbow -->
  <rect x="7.5" y="9" width="5" height="1.5" fill="#4a90c4"/>
  <!-- Branch 1 label dots (representing text) -->
  <rect x="14" y="8.25" width="8" height="1.5" rx="0.75" fill="#fff" opacity="0.85"/>
  <rect x="14" y="10.25" width="5" height="1" rx="0.5" fill="#fff" opacity="0.3"/>

  <!-- Branch 2 (middle): horizontal line -->
  <rect x="7.5" y="16" width="5" height="1.5" fill="#4a90c4"/>
  <!-- Branch 2 label dots -->
  <rect x="14" y="15.25" width="10" height="1.5" rx="0.75" fill="#fff" opacity="0.85"/>
  <rect x="14" y="17.25" width="6" height="1" rx="0.5" fill="#fff" opacity="0.3"/>

  <!-- Branch 3 (bottom, └ elbow): crop trunk at bottom -->
  <rect x="6" y="23" width="1.5" height="1.5" fill="#0d1117"/><!-- hide trunk below last branch -->
  <rect x="7.5" y="22" width="5" height="1.5" fill="#4a90c4"/>
  <!-- Branch 3 label dots -->
  <rect x="14" y="21.25" width="7" height="1.5" rx="0.75" fill="#fff" opacity="0.85"/>
  <rect x="14" y="23.25" width="4" height="1" rx="0.5" fill="#fff" opacity="0.3"/>

  <!-- Corner dot (root) -->
  <circle cx="6.75" cy="5.75" r="1.75" fill="#4a90c4"/>
</svg>
