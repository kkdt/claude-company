<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Company</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f4f6f9; color: #222; }
    header {
      background: #1a3a5c; color: #fff; padding: 1rem 2rem;
      display: flex; align-items: center; gap: 2rem;
    }
    header h1 { font-size: 1.4rem; letter-spacing: 0.03em; flex-shrink: 0; }
    header nav { display: flex; align-items: center; gap: 0; flex-shrink: 0; }
    header nav a { color: #cde; text-decoration: none; font-size: 0.95rem; margin-right: 1.2rem; }
    header nav a:hover { color: #fff; text-decoration: underline; }
    .search-form { display: flex; align-items: center; margin-left: auto; }
    .search-form input {
      padding: 0.35rem 0.75rem; border: none; border-radius: 4px 0 0 4px;
      font-size: 0.875rem; width: 220px; outline: none; background: #f0f5fa; color: #222;
    }
    .search-form input::placeholder { color: #999; }
    .search-form button {
      padding: 0.35rem 0.75rem; border: none; border-radius: 0 4px 4px 0;
      background: #2e7d4f; color: #fff; cursor: pointer; font-size: 0.875rem;
    }
    .search-form button:hover { background: #256040; }
    .container { max-width: 1200px; margin: 2rem auto; padding: 0 1.5rem; }
    .flash { padding: 0.75rem 1rem; border-radius: 4px; margin-bottom: 1.25rem; font-size: 0.9rem; }
    .flash.info { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .flash.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
  </style>
</head>
<body>
  <header>
    <h1>Company</h1>
    <nav>
      <a href="{{ url_for('upload') }}">Upload CSV</a>
      <a href="{{ url_for('employees') }}">View Employees</a>
      <a href="{{ url_for('organization') }}">Organization</a>
      <a href="{{ url_for('projects') }}">Projects</a>
      <a href="{{ url_for('staffing') }}">Staffing</a>
    </nav>
    <form class="search-form" action="{{ url_for('search') }}" method="get">
      <input type="search" name="q" placeholder="Search employees…" value="{{ request.args.get('q', '') }}">
      <button type="submit">Search</button>
    </form>
  </header>
  <div class="container">
    {% with messages = get_flashed_messages() %}
      {% for msg in messages %}
        <div class="flash info">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
