{% extends "base.html" %}
{% block content %}
<style>
  .toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
  .toolbar h2 { font-size: 1.2rem; }
  .btn-back {
    display: inline-block; padding: 0.35rem 0.9rem; font-size: 0.85rem;
    background: #1a3a5c; color: #fff; border-radius: 4px; text-decoration: none;
  }
  .btn-back:hover { background: #255480; }
  .controls { margin-bottom: 1rem; display: flex; gap: 0.5rem; }
  .controls button {
    font-size: 0.8rem; padding: 0.3rem 0.8rem; border: 1px solid #bcd;
    border-radius: 4px; background: #fff; cursor: pointer; color: #1a3a5c;
  }
  .controls button:hover { background: #eef3f9; }
  #chart-wrap {
    background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.1);
    overflow: auto; cursor: grab; user-select: none; max-height: 78vh;
  }
  #chart-wrap:active { cursor: grabbing; }
  #chart-svg { display: block; }
  .empty { text-align: center; padding: 3rem; color: #888; }
  .empty a { color: #1a3a5c; }
</style>

<div class="toolbar">
  <h2>Organization Chart</h2>
  <a class="btn-back" href="{{ url_for('organization') }}">&larr; Back to Organization</a>
</div>

{% if roots %}
<div class="controls">
  <button onclick="zoomIn()">+ Zoom In</button>
  <button onclick="zoomOut()">- Zoom Out</button>
  <button onclick="resetZoom()">Reset</button>
</div>
<div id="chart-wrap"><svg id="chart-svg"></svg></div>

<script>
  const roots      = {{ roots | tojson }};
  const childrenMap = {{ children_map | tojson }};

  // Layout constants
  const NW = 180, NH = 52;   // node width / height
  const HGAP = 24;            // horizontal gap between siblings
  const VGAP = 60;            // vertical gap between levels
  const PAD  = 40;

  // ── 1. Compute subtree widths (bottom-up) ──────────────────────────────────
  function subtreeWidth(id) {
    const children = childrenMap[id] || [];
    if (!children.length) return NW;
    const total = children.reduce((s, c) => s + subtreeWidth(c.employee_id), 0)
                + HGAP * (children.length - 1);
    return Math.max(NW, total);
  }

  // ── 2. Assign x/y positions (top-down) ────────────────────────────────────
  const positions = {};   // employee_id → {x, y}  (x = centre of node)

  function layout(emp, centreX, depth) {
    positions[emp.employee_id] = { x: centreX, y: PAD + depth * (NH + VGAP) };
    const children = childrenMap[emp.employee_id] || [];
    if (!children.length) return;
    const totalW = children.reduce((s, c) => s + subtreeWidth(c.employee_id), 0)
                 + HGAP * (children.length - 1);
    let curX = centreX - totalW / 2;
    children.forEach(c => {
      const cw = subtreeWidth(c.employee_id);
      layout(c, curX + cw / 2, depth + 1);
      curX += cw + HGAP;
    });
  }

  // Layout each root, spaced horizontally
  let offsetX = PAD;
  roots.forEach(r => {
    const sw = subtreeWidth(r.employee_id);
    layout(r, offsetX + sw / 2, 0);
    offsetX += sw + HGAP * 3;
  });

  // ── 3. Compute canvas size ─────────────────────────────────────────────────
  const allPos = Object.values(positions);
  const maxX = Math.max(...allPos.map(p => p.x)) + NW / 2 + PAD;
  const maxY = Math.max(...allPos.map(p => p.y)) + NH     + PAD;

  // ── 4. Render SVG ──────────────────────────────────────────────────────────
  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function truncate(s, n) { s = String(s||''); return s.length > n ? s.slice(0, n-1) + '…' : s; }

  // Collect all employees into a flat map
  const allEmps = {};
  function collectEmps(emp) {
    allEmps[emp.employee_id] = emp;
    (childrenMap[emp.employee_id] || []).forEach(collectEmps);
  }
  roots.forEach(collectEmps);

  let svg = `<defs>
    <filter id="sh"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.10"/></filter>
  </defs>`;

  // Draw edges first (behind nodes)
  Object.entries(positions).forEach(([id, pos]) => {
    const children = childrenMap[id] || [];
    children.forEach(c => {
      const cp = positions[c.employee_id];
      const x1 = pos.x, y1 = pos.y + NH;
      const x2 = cp.x, y2 = cp.y;
      const my = (y1 + y2) / 2;
      svg += `<path d="M${x1},${y1} C${x1},${my} ${x2},${my} ${x2},${y2}"
                    fill="none" stroke="#b0c4d8" stroke-width="1.5"/>`;
    });
  });

  // Draw nodes
  Object.entries(positions).forEach(([id, pos]) => {
    const emp = allEmps[id];
    if (!emp) return;
    const x = pos.x - NW / 2, y = pos.y;
    const isManager = (childrenMap[id] || []).length > 0;
    const fill   = isManager ? '#1a3a5c' : '#f8fafc';
    const stroke = isManager ? '#1a3a5c' : '#d0dce8';
    const nameColor = isManager ? '#ffffff' : '#1a3a5c';
    const metaColor = isManager ? '#adc8e8' : '#666666';
    const empUrl = `/employees/${encodeURIComponent(id)}`;

    svg += `
      <a href="${empUrl}" style="cursor:pointer">
        <rect x="${x}" y="${y}" width="${NW}" height="${NH}" rx="6"
              fill="${fill}" stroke="${stroke}" stroke-width="1" filter="url(#sh)"/>
        <text x="${pos.x}" y="${y + 20}" text-anchor="middle"
              font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="${nameColor}">
          ${esc(truncate(emp.employee_name, 22))}
        </text>
        <text x="${pos.x}" y="${y + 34}" text-anchor="middle"
              font-family="system-ui,sans-serif" font-size="10" fill="${metaColor}">
          ${esc(truncate(emp.job_profile, 26))}
        </text>
        <text x="${pos.x}" y="${y + 46}" text-anchor="middle"
              font-family="system-ui,sans-serif" font-size="9" fill="${metaColor}">
          ${esc(emp.employee_id)}
        </text>
      </a>`;
  });

  const svgEl = document.getElementById('chart-svg');
  svgEl.setAttribute('width',   maxX);
  svgEl.setAttribute('height',  maxY);
  svgEl.setAttribute('viewBox', `0 0 ${maxX} ${maxY}`);
  svgEl.innerHTML = svg;

  // ── 5. Zoom ────────────────────────────────────────────────────────────────
  let scale = 1;
  function zoomIn()    { scale = Math.min(scale + 0.15, 3);    applyZoom(); }
  function zoomOut()   { scale = Math.max(scale - 0.15, 0.25); applyZoom(); }
  function resetZoom() { scale = 1; applyZoom(); }
  function applyZoom() {
    svgEl.setAttribute('width',  maxX * scale);
    svgEl.setAttribute('height', maxY * scale);
  }

  // ── 6. Pan ─────────────────────────────────────────────────────────────────
  const wrap = document.getElementById('chart-wrap');
  let dragging = false, sx, sy, sl, st;
  wrap.addEventListener('mousedown', e => { dragging=true; sx=e.pageX-wrap.offsetLeft; sy=e.pageY-wrap.offsetTop; sl=wrap.scrollLeft; st=wrap.scrollTop; });
  wrap.addEventListener('mouseleave', () => dragging=false);
  wrap.addEventListener('mouseup',    () => dragging=false);
  wrap.addEventListener('mousemove',  e => {
    if (!dragging) return;
    e.preventDefault();
    wrap.scrollLeft = sl - (e.pageX - wrap.offsetLeft - sx);
    wrap.scrollTop  = st - (e.pageY - wrap.offsetTop  - sy);
  });
</script>

{% else %}
<div class="empty">
  No employees loaded. <a href="{{ url_for('upload') }}">Upload a CSV file</a> to get started.
</div>
{% endif %}
{% endblock %}
